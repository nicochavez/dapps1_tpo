  /clientes/me/compras/{id}:
    get:
      tags: [Compras]
      summary: Obtener detalle de una compra
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detalle de la compra
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompraResumen'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /clientes/me/compras/{id}/retiro-personal:
    put:
      tags: [Compras]
      summary: Seleccionar retiro personal de una compra
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Retiro personal confirmado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /clientes/me/subastas:
    get:
      tags: [Compras]
      summary: Listar subastas en las que participó el usuario
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Historial de participación
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        identificador:
                          type: integer
                        fecha:
                          type: string
                          format: date
                        categoria:
                          type: string
                        estado:
                          type: string
                        ganadas:
                          type: integer
                        totalOfertado:
                          type: number
                          format: double
                  totalPages:
                    type: integer
                  totalElements:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ═══════════════ PAISES ═══════════════

  /paises:
    get:
      tags: [Paises]
      summary: Listar países disponibles
      responses:
        '200':
          description: Lista de países
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pais'

  # ═══════════════ MULTAS ═══════════════

  /clientes/me/multas:
    get:
      tags: [Multas]
      summary: Obtener multas pendientes del usuario
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Multas pendientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MultaResumen'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /clientes/me/multas/{id}/pagar:
    post:
      tags: [Multas]
      summary: Pagar una multa pendiente
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultaPagoRequest'
      responses:
        '200':
          description: Multa pagada exitosamente
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Fondos insuficientes

  # ═══════════════ CUENTAS COBRO ═══════════════

  /clientes/me/cuentas-cobro:
    get:
      tags: [CuentasCobro]
      summary: Listar cuentas de cobro del usuario
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Cuentas de cobro
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CuentaCobroResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [CuentasCobro]
      summary: Registrar cuenta de cobro
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CuentaCobroRequest'
      responses:
        '201':
          description: Cuenta de cobro registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuentaCobroResponse'
        '400':
          description: Datos inválidos
        '401':
          $ref: '#/components/responses/Unauthorized'

  /clientes/me/cuentas-cobro/{id}:
    delete:
      tags: [CuentasCobro]
      summary: Eliminar cuenta de cobro
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Cuenta eliminada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Cuenta asociada a subasta activa

  # ─────────────────────────────────────────────
  # REUSABLE RESPONSES
  # ─────────────────────────────────────────────
  responses:
    Unauthorized:
      description: No autenticado o token inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - BearerAuth: []
