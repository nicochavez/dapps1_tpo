        - name: categoria
          in: query
          schema:
            type: string
            enum: [comun, especial, plata, oro, platino]
        - name: fecha
          in: query
          schema:
            type: string
            format: date
        - name: moneda
          in: query
          schema:
            type: string
            enum: [ARS, USD]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
