  # ═══════════════ PUJAS ═══════════════

  /subastas/{subastaId}/items/{itemId}/pujas:
    post:
      tags: [Pujas]
      summary: Realizar una puja
      security:
        - BearerAuth: []
      parameters:
        - name: subastaId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PujaRequest'
      responses:
        '201':
          description: Puja registrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PujaResponse'
        '400':
          description: Importe fuera del rango permitido
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Sin medio de pago verificado, categoría insuficiente o multa pendiente
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: La subasta o el item no están activos
        '422':
          description: Fondos insuficientes

    get:
      tags: [Pujas]
      summary: Historial de pujas de un item
      parameters:
        - name: subastaId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Historial de pujas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PujaHistorial'
        '404':
          $ref: '#/components/responses/NotFound'

