    get:
      tags: [Pujas]
      summary: Historial de pujas del usuario autenticado en una subasta
      security:
        - BearerAuth: []
      parameters:
        - name: subastaId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pujas del usuario en la subasta
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    item:
                      type: object
                      properties:
                        identificador:
                          type: integer
                        descripcion:
                          type: string
                    importe:
                      type: number
                      format: double
                    ganador:
                      type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /pujas/{productoId}:
    get:
      tags: [Pujas]
      summary: Obtener pujas por producto
      security:
        - BearerAuth: []
      parameters:
        - name: productoId
          in: path
          required: true
          schema:
            type: integer
      responses:
